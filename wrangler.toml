# Cloudflare Pages project.
#
# Pages (unlike Workers) supports custom domains with EXTERNAL DNS, so
# flatroutes.com stays on Porkbun's nameservers and just points a record here.
name = "flat-route-finder"
compatibility_date = "2026-07-01"
pages_build_output_dir = "public"

# ORS_API_KEY is NOT set here — it's a secret.
# Production: dashboard → Pages project → Settings → Variables and Secrets.
# Local dev:  .dev.vars (gitignored).
