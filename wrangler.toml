name = "flat-route-finder"
main = "src/index.js"
compatibility_date = "2026-07-01"

# public/ is served by Cloudflare's static asset layer. Asset requests are free
# and don't count as Worker invocations; the Worker only runs for /api/*.
[assets]
directory = "./public"

# ORS_API_KEY is NOT set here — it's a secret.
# Production: dashboard → the Worker → Settings → Variables and Secrets.
# Local dev:  .dev.vars (gitignored).
